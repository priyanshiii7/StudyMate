<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="main">
    <h1>GET STARTED</h1>
    <div class="container">
      <img src="imgs/Premium Vector _ Cute Astronaut Floating In Space, cartoon character.jpeg" class="astronaut" alt="Astronaut">
      <div class="login-page">
        <form action="process_signup.php" method="post">
          <h3>SIGN UP</h3>
          <input type="text" name="username" placeholder="Username" class="username" required>
          <input type="number" name="age" placeholder="Age" class="username" required>
          <input type="email" name="email" placeholder="Email" class="username" required>
          <input type="password" name="password" placeholder="Password" class="username" required>
          <input type="password" name="confirm_password" placeholder="Confirm Password" class="username" required>
  
        <a href="/Studymate/new/new.html"> <button type="submit" class="log-in">SIGN UP</button></a> 
        </form>
      </div>
    </div>
  </div>
</body>
</html>
